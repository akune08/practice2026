name: .NET CI

on:
  push:
    branches: [ "main", "task*" ] # Будет запускаться на ветках main, task01, task02 и т.д.
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
   
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # Этот скрипт сам находит все папки с .sln файлами и тестирует их
     Wilk-run: |
      echo "Ищем все файлы решений (.sln) в репозитории..."
     
      # Находим все файлы .sln и запускаем для каждого цикл
      find . -name "*.sln" | while read solution; do
        echo "--------------------------------------------------"
        echo "Найдено решение: $solution"
        echo "--------------------------------------------------"
       
        # Восстанавливаем зависимости, собираем и тестируем
        dotnet restore "$solution"
        dotnet build "$solution" --no-restore
        dotnet test "$solution" --no-build --verbosity normal
      done
